    const insights = {
        low: {
            resultBase: "0～6分：性欲、勃起硬度、维持时间、射精控制、自信心、满意度六项均偏弱，整体功能处于偏低水平，",
            gradeSuffix: "属于重度异常。",
            core: "1. 整体功能全面偏弱，不单是某一项问题；\n2. 考虑存在器质性问题，同时伴随身体基础水平下降，以及焦虑等心理问题。\n3. 大概率是生活方式+心理因素+器质性因素叠加所致。",
            suggestion: "请到正规男科机构就医检查，完善性激素、血糖血脂、血压、甲功、阴茎供血和敏感度等检查，及早对症治疗，恢复空间大。切忌自行服药，避免加重或延误病情。"
        },
        mid: {
            resultBase: "7～14分：存在间歇性或轻中度问题（硬度不足、中途疲软或射精控制欠佳），影响生活质量。",
            gradeSuffix: "属于轻度异常。",
            core: "1. 症状反复出现，多为疲劳、不良生活习惯所致。\n2. 自身器质性问题可能性大，心理因素、生活习惯为辅助因素。\n3. 多数人调整生活或用治疗后可改善，恢复空间大。",
            suggestion: "优先到正规男科机构做基础评估，明确是心理性、生活方式还是轻微器质性问题，同时结合生活方式指导，必要时配合药物干预治疗，多数1~2个月内恢复。不自行乱吃壮阳药、偏方，避免加重。"
        },
        high: {
            resultBase: "15～24分：性功能各项指标良好，偶尔不满意属生理波动。",
            gradeSuffix: "属于正常范围。",
            core: "1. 生理基础良好，血管、神经、激素大概率正常；\n2. 多为心理敏感或偶发疲劳影响；\n3. 无需用药或手术。",
            suggestion: "保持良好心态，均衡饮食，规律作息、适度运动，避免长期熬夜、久坐憋尿。规律性生活，不纵欲、不刻意禁欲，保持身心放松。"
        }
    };

    function showInterpretation(total) {
        let type, gradeText;
        if (total <= 6) { type = 'low'; gradeText = "重度异常"; }
        else if (total <= 14) { type = 'mid'; gradeText = "轻度异常"; }
        else { type = 'high'; gradeText = "正常"; }
        const data = insights[type];
        const rangeText = total <=6 ? "0～6分" : (total <=14 ? "7～14分" : "15～24分");
        document.getElementById("scoreRangeTag").innerText = rangeText + " · " + gradeText;
        document.getElementById("totalScore").innerText = total;
        const container = document.getElementById("insightContainer");
        const resultFull = data.resultBase + " " + data.gradeSuffix;
        container.innerHTML = `
            <div class="insight-card">
                <div class="insight-title">📌 ${type === 'low' ? '🔴 重度异常' : (type === 'mid' ? '🟡 轻度异常' : '🟢 功能正常')}</div>
                <div><strong>📖 结果解读</strong><br><span class="text-muted">${resultFull}</span></div>
                <div class="section-head">🎯 核心判断</div>
                <div class="text-muted" style="white-space: pre-line;">${data.core}</div>
                <div class="section-head">💡 建议</div>
                <div class="text-muted">${data.suggestion}</div>
            </div>
        `;
        document.getElementById("scoreDisplay").style.display = "block";
    }

    function saveTestRecord(scores, total) {
        try {
            let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
            records.unshift({ timestamp: new Date().toLocaleString(), scores: [...scores], total });
            if (records.length > 200) records = records.slice(0, 200);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
        } catch(e) { console.warn(e); }
    }

    function getHistory() {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    }

    function clearHistory() {
        localStorage.removeItem(STORAGE_KEY);
    }

    function getGradeInfo(total) {
        if (total <= 6) return { text: "重度异常", class: "level-severe" };
        if (total <= 14) return { text: "轻度异常", class: "level-mild" };
        return { text: "正常", class: "level-normal" };
    }

    function exportToXLS() {
        const history = getHistory();
        if (!history.length) { alert("暂无历史数据可导出。"); return; }
        let html = `<html><head><meta charset="UTF-8"><title>男性健康自测记录</title></head><body>
        <h2>男性健康自测记录</h2>
        <table border="1" cellpadding="5" cellspacing="0" style="border-collapse: collapse;">
        <thead><tr><th>序号</th><th>测试时间</th><th>Q1性欲</th><th>Q2勃起硬度</th><th>Q3维持时间</th><th>Q4射精控制</th><th>Q5自信焦虑</th><th>Q6满意度</th><th>总分</th><th>等级</th></tr></thead><tbody>`;
        history.forEach((rec, idx) => {
            const grade = getGradeInfo(rec.total);
            html += `<tr><td>${idx+1}</td><td>${rec.timestamp}</td>${rec.scores.map(s=>`<td>${s}</td>`).join('')}<td><strong>${rec.total}</strong></td><td>${grade.text}</td></tr>`;
        });
        html += `</tbody></table><p>导出时间：${new Date().toLocaleString()}</p></body></html>`;
        const blob = new Blob([html], { type: "application/vnd.ms-excel" });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = "男性健康自测数据.xls";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        alert("导出成功！");
    }

    function showAdminData() {
        const history = getHistory();
        const modal = document.createElement('div'); modal.className = 'modal-overlay';
        const modalContainer = document.createElement('div'); modalContainer.className = 'modal-container';
        let avgTotal = 0;
        history.forEach(r => avgTotal += r.total);
        const avg = history.length ? (avgTotal / history.length).toFixed(1) : 0;
        const normalCount = history.filter(r => r.total >= 15).length;
        const mildCount = history.filter(r => r.total >= 7 && r.total <= 14).length;
        const severeCount = history.filter(r => r.total <= 6).length;

        modalContainer.innerHTML = `
            <div class="modal-header">
                <h3>📋 后台测试记录</h3>
                <div class="stats-badge">总记录 ${history.length} 条 | 平均分 ${avg} | 正常 ${normalCount} / 轻度 ${mildCount} / 重度 ${severeCount}</div>
            </div>
            <div class="modal-body">
                ${history.length === 0 ? '<p class="text-muted" style="text-align:center;">暂无历史数据。每次计算总分后会自动保存记录。</p>' : `
                <table class="admin-table">
                    <thead><tr><th>序号</th><th>时间</th><th>Q1</th><th>Q2</th><th>Q3</th><th>Q4</th><th>Q5</th><th>Q6</th><th>总分</th><th>等级</th></tr></thead>
                    <tbody>
                        ${history.map((rec, idx) => {
                            const grade = getGradeInfo(rec.total);
                            return `<tr>
                                <td>${idx+1}</td>
                                <td>${rec.timestamp}</td>
                                ${rec.scores.map(s => `<td>${s}</td>`).join('')}
                                <td><strong>${rec.total}</strong></td>
                                <td class="${grade.class}">${grade.text}</td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>
                `}
            </div>
            <div class="modal-actions">
                <button class="close-modal">关闭</button>
                ${history.length ? `<button class="export-btn">📎 导出 XLS</button><button class="clear-history">🗑️ 清空所有记录</button>` : ''}
            </div>
        `;
        modalContainer.querySelector('.close-modal')?.addEventListener('click', () => modal.remove());
        if (history.length) {
            modalContainer.querySelector('.export-btn')?.addEventListener('click', () => {
                if (/MicroMessenger/i.test(navigator.userAgent)) {
                    alert("微信内可能无法直接下载文件，请点击右上角「…」在浏览器中打开后再导出。");
                }
                exportToXLS();
            });
            modalContainer.querySelector('.clear-history')?.addEventListener('click', () => {
                if (confirm('确认清空所有历史测试记录吗？')) {
                    clearHistory();
                    modal.remove();
                    alert('历史记录已清空');
                }
            });
        }
        modal.appendChild(modalContainer);
        document.body.appendChild(modal);
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    }

    let resetClicks = [];
    function normalReset() {
        for (let i=1;i<=6;i++) document.querySelectorAll(`input[name="q_${i}"]`).forEach(r=>r.checked=false);
        document.getElementById("scoreDisplay").style.display = "none";
        document.getElementById("insightContainer").innerHTML = `<div class="text-muted" style="padding:1rem; text-align:center;">✨ 完成自测后点击「计算总分与解读」获取详细建议 ✨</div>`;
    }
    function onResetClick() {
        const now = Date.now();
        resetClicks = resetClicks.filter(t => now - t <= 1000);
        resetClicks.push(now);
        if (resetClicks.length >= 3) {
            resetClicks = [];
            const pwd = prompt("🔐 管理员验证\n请输入密码查看后台数据：");
            if (pwd && sha256(pwd) === ADMIN_PASSWORD_HASH) {
                showAdminData();
            } else if (pwd !== null) {
                alert("密码错误，无权限查看后台数据。");
            }
            return;
        }
        normalReset();
    }
    function onCalcClick() {
        const scores = getScores();
        if (!scores) { alert("请完成所有6道自测题目后再查看结果。"); return; }
        const total = scores.reduce((a,b)=>a+b,0);
        saveTestRecord(scores, total);
        showInterpretation(total);
        document.getElementById("scoreDisplay").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function generateQRCode() {
        const container = document.getElementById("qrcodeBox");
        if (!container) return;
        container.innerHTML = "";
        const url = window.location.href;
        if (typeof QRCode === 'undefined') {
            const script = document.createElement('script');
            script.src = "https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js";
            script.onload = () => createQR(container, url);
            script.onerror = () => container.innerHTML = '<div>⚠️ 二维码加载失败</div>';
            document.head.appendChild(script);
        } else createQR(container, url);
    }
    function createQR(container, url) {
        try {
            container.innerHTML = '';
            const div = document.createElement('div');
            div.id = 'qr_' + Date.now();
            container.appendChild(div);
            new QRCode(div, { text: url, width: 90, height: 90, colorDark: "#1f6e43", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.L });
        } catch(e) { container.innerHTML = '<div>二维码生成失败</div>'; }
    }

    function checkWechat() {
        if (/MicroMessenger/i.test(navigator.userAgent)) {
            const warnDiv = document.getElementById('wechatWarning');
            if (warnDiv) warnDiv.style.display = 'flex';
        }
    }

    function enlargeImage(imgElement, title = "微信咨询二维码") {
        if (!imgElement) return;
        imgElement.addEventListener('click', () => {
            const modal = document.createElement('div'); modal.className = 'modal-overlay';
            const box = document.createElement('div'); box.className = 'modal-container'; box.style.textAlign = 'center';
            box.innerHTML = `<h3>${title}</h3><img src="${imgElement.src}" style="width:200px;height:200px;margin:1rem auto;border-radius:20px;"><br><button class="close-modal" style="margin:1rem auto 0;">关闭</button>`;
            const closeBtn = box.querySelector('.close-modal');
            closeBtn.onclick = () => modal.remove();
            modal.appendChild(box);
            document.body.appendChild(modal);
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
        });
    }

    function init() {
        buildForm();
        document.getElementById("calcBtn").addEventListener("click", onCalcClick);
        document.getElementById("resetBtn").addEventListener("click", onResetClick);
        normalReset();
        generateQRCode();
        checkWechat();
        const img1 = document.getElementById('wechatImg1');
        const img2 = document.getElementById('wechatImg2');
        if (img1) enlargeImage(img1, "微信咨询1");
        if (img2) enlargeImage(img2, "微信咨询2");
        document.addEventListener('click', (e) => {
            const opt = e.target.closest('.radio-option');
            if (opt) {
                const radio = opt.querySelector('input[type="radio"]');
                if (radio && !radio.checked) radio.checked = true;
            }
        });
    }
    init();
</script>
</body>
</html>
